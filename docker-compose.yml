services:
  # ── Development ───────────────────────────────
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "${API_PORT:-3001}:${PORT:-3001}"
      - "${WEB_PORT:-9000}:9000"
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - NODE_ENV=development
      - DEVMODE=true
      - DATABASE_URL=${DATABASE_URL:-postgresql://bndstr:bndstr_dev@host.docker.internal:5432/bndstr}
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm run dev"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - dev

  # ── Production (unified) ────────────────────
  prod:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - NODE_ENV=production
      - PORT=3001
    container_name: ${COOLIFY_CONTAINER_NAME:-bndstr-prod}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bndstr-prod.rule=Host(`${APP_DOMAIN:-bndstr.trmusic.de}`)"
      - "traefik.http.routers.bndstr-prod.entrypoints=https"
      - "traefik.http.routers.bndstr-prod.tls=true"
      - "traefik.http.routers.bndstr-prod.tls.certresolver=letsencrypt"
      - "traefik.http.services.bndstr-prod.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"
    networks:
      - app-net
      - proxy-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - prod

networks:
  app-net:
    name: bndstr-net
  proxy-net:
    external: true
    name: ${DOCKER_NETWORK:-coolify}

volumes:
  node_modules:
