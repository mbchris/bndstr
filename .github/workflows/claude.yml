name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          claude_args: >-
            --allowedTools "Read"
            --allowedTools "Edit"
            --allowedTools "Write"
            --allowedTools "Glob"
            --allowedTools "Grep"
            --allowedTools "Bash(git status)"
            --allowedTools "Bash(git diff*)"
            --allowedTools "Bash(git log*)"
            --allowedTools "Bash(git show*)"
            --allowedTools "Bash(git add *)"
            --allowedTools "Bash(git commit*)"
            --allowedTools "Bash(git push)"
            --allowedTools "Bash(git checkout*)"
            --allowedTools "Bash(git branch*)"
            --allowedTools "Bash(git fetch*)"
            --allowedTools "Bash(git pull*)"
            --allowedTools "Bash(git stash*)"
            --allowedTools "Bash(git ls-files*)"
            --allowedTools "Bash(git update-index*)"
            --allowedTools "Bash(npm run test)"
            --allowedTools "Bash(npm run lint)"
            --allowedTools "Bash(npm run typecheck)"
            --allowedTools "Bash(npm run build)"
            --allowedTools "Bash(npm install*)"
            --allowedTools "Bash(npx nuxt *)"
            --allowedTools "Bash(npx eslint *)"
            --allowedTools "Bash(npx tsx *)"
            --allowedTools "Bash(node *)"
            --allowedTools "Bash(gh pr view*)"
            --allowedTools "Bash(gh pr list*)"
            --allowedTools "Bash(gh pr comment*)"
            --allowedTools "Bash(gh issue view*)"
            --allowedTools "Bash(gh issue list*)"
            --allowedTools "Bash(gh issue comment*)"
            --allowedTools "Bash(gh run view*)"
            --allowedTools "Bash(gh run list*)"
            --allowedTools "Bash(gh api *)"
            --allowedTools "Bash(chmod *)"
